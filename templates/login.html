{% extends 'base.html' %}

{% block title %}
Login
{% endblock %}

{% block content %}
<div class="card p-4 text-dark shadow-sm max-w-md mx-auto mt-5" >
    <h2 class="mb-4 text-center" style="color:white;">Login</h2>

    <!-- Form Interface -->
    <form method="POST" action="/login">
        <!-- Structural validation protection tag -->
        <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">

        <!-- Email input line -->
        <div class="mb-3">
            <input type="email" name="email" placeholder="Email" class="form-control" required autocomplete="email">
        </div>

        <!-- Password input line -->
        <div class="mb-3">
            <input type="password" name="password" placeholder="Password" class="form-control" required autocomplete="current-password">
        </div>

        <!-- Submission trigger anchor -->
        <button type="submit" class="btn btn-primary w-100">
            Login
        </button>
    </form>

    <!-- Error message alert display gate -->
    {% if error %}
    <div class="alert alert-danger mt-3 mb-0" role="alert">
        {{ error }}
    </div>
    {% endif %}

    <!-- Navigation links block -->
    <p class="mt-3 text-center mb-0" style="color:white;">
        Don't have an account?
        <a href="/register" class="text-decoration-none">Register</a>
    </p>
</div>

<div class="mt-3 text-center">

<a href="/forgot_password">
Forgot Password?
</a>

</div>
{% endblock %}
