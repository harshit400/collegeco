</html>{% extends 'base.html' %}

{% block title %}
Forgot Password - College Connect
{% endblock %}

{% block content %}
<style>
    .auth-card {
        background-color: var(--cc-surface) !important;
        border: 1px solid var(--cc-border) !important;
        border-radius: 16px !important;
        box-shadow: 0 16px 36px rgba(0, 0, 0, 0.4) !important;
    }
    .auth-input {
        background-color: #0b0f19 !important;
        border: 1px solid var(--cc-border) !important;
        color: #ffffff !important;
        padding: 0.8rem 1rem !important;
        border-radius: 10px !important;
    }
    .auth-input:focus {
        background-color: #0f172a !important;
        border-color: var(--cc-primary) !important;
        box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.25) !important;
        color: #ffffff !important;
    }
    .btn-cc-primary {
        background-color: var(--cc-primary) !important;
        border: none !important;
        padding: 0.8rem !important;
        font-weight: 600;
        border-radius: 10px !important;
        transition: all 0.2s ease;
    }
    .btn-cc-primary:hover {
        background-color: var(--cc-primary-hover) !important;
        box-shadow: 0 4px 14px rgba(37, 99, 235, 0.3);
    }
</style>

<div class="row justify-content-center my-5">
    <div class="col-12 col-sm-10 col-md-7 col-lg-5 col-xl-4">
        <div class="card p-4 auth-card">
            <div class="text-center mb-4">
                <div class="d-inline-flex align-items-center justify-content-center bg-primary bg-opacity-10 text-primary rounded-circle mb-3" style="width: 56px; height: 56px;">
                    <i class="bi bi-shield-lock-fill fs-3"></i>
                </div>
                <h2 class="fw-bold text-white h4 mb-2">Forgot Password</h2>
                <p class="m-0 small text-white-50 px-2" style="color: var(--cc-text-muted) !important;">
                    Provide your institutional account vector address below to initialize the recovery sequence.
                </p>
            </div>

            <form method="POST">
                <div class="mb-3">
                    <label class="form-label small fw-semibold text-white-50 mb-2">Account Email Address</label>
                    <input type="email" name="email" placeholder="Enter verified email..." class="form-control auth-input" required>
                </div>

                <button class="btn btn-primary w-100 btn-cc-primary d-flex align-items-center justify-content-center gap-2">
                    Dispatch Verification OTP <i class="bi bi-send-fill small"></i>
                </button>
            </form>
        </div>
    </div>
</div>
{% endblock %}
