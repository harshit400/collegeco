{% extends 'base.html' %}

{% block title %}
Personal Chat Thread - College Connect
{% endblock %}

{% block content %}
<style>
    .chat-workspace {
        background-color: var(--cc-surface) !important;
        border: 1px solid var(--cc-border) !important;
        border-radius: 14px !important;
        box-shadow: 0 12px 36px rgba(0, 0, 0, 0.3) !important;
        overflow: hidden;
    }
    .chat-header {
        background-color: #0b0f19 !important;
        border-bottom: 1px solid var(--cc-border) !important;
        padding: 1rem 1.25rem !important;
    }
    #chatBox {
        height: 420px;
        background-color: #0d1321 !important;
        overflow-y: auto;
        padding: 1.5rem !important;
        border: none !important;
        border-radius: 0 !important;
    }
    /* Elegant Custom Scrollbars for the Thread Stream */
    #chatBox::-webkit-scrollbar {
        width: 6px;
    }
    #chatBox::-webkit-scrollbar-track {
        background: rgba(0, 0, 0, 0.1);
    }
    #chatBox::-webkit-scrollbar-thumb {
        background: rgba(255, 255, 255, 0.1);
        border-radius: 3px;
    }
    .chat-footer {
        background-color: #0b0f19 !important;
        border-top: 1px solid var(--cc-border) !important;
        padding: 1rem !important;
    }
    .chat-field {
        background-color: var(--cc-surface) !important;
        border: 1px solid var(--cc-border) !important;
        color: #ffffff !important;
        padding: 0.65rem 1rem !important;
        border-radius: 10px !important;
    }
    .chat-field:focus {
        background-color: #1e293b !important;
        border-color: var(--cc-primary) !important;
        box-shadow: none !important;
        color: #ffffff !important;
    }
    .btn-chat-send {
        background-color: var(--cc-primary) !important;
        border: none !important;
        border-radius: 10px !important;
        padding: 0.65rem 1.25rem !important;
        font-weight: 600;
    }
    /* Thread Bubble Styling Matrix rules */
    .msg-bubble-outbound {
        background-color: var(--cc-primary) !important;
        color: #ffffff !important;
        padding: 0.65rem 1rem !important;
        border-radius: 12px 12px 2px 12px !important;
        display: inline-block;
        max-width: 75%;
        text-align: left;
        box-shadow: 0 2px 6px rgba(37, 99, 235, 0.15);
    }
    .msg-bubble-inbound {
        background-color: rgba(255, 255, 255, 0.08) !important;
        color: #f1f5f9 !important;
        padding: 0.65rem 1rem !important;
        border-radius: 12px 12px 12px 2px !important;
        display: inline-block;
        max-width: 75%;
        text-align: left;
        box-shadow: 0 2px 6px rgba(0, 0, 0, 0.1);
    }
</style>

<div class="row mt-1 mb-4">
    <div class="col-12 col-lg-10 col-xl-8 mx-auto">
        
        <div class="card chat-workspace">
            <!-- Thread Title Bar Metadata descriptor -->
            <div class="chat-header d-flex align-items-center justify-content-between">
                <div class="d-flex align-items-center gap-2.5">
                    <div class="rounded-circle bg-success bg-opacity-10 text-success d-flex align-items-center justify-content-center" style="width: 32px; height: 32px;">
                        <i class="bi bi-chat-square-dots-fill"></i>
                    </div>
                    <h2 class="h5 fw-bold text-white m-0" style="letter-spacing: -0.01em;">Personal Chat Thread</h2>
                </div>
                
                <a href="/chat_list" class="btn btn-outline-secondary btn-sm px-3 rounded-2" style="border-color: var(--cc-border); color: var(--cc-text-muted); font-size: 0.85rem;">
                    <i class="bi bi-arrow-left me-1"></i> Active Channels
                </a>
            </div>

            <!-- ASYNCHRONOUSLY POPULATED MESSAGE BARS -->
            <div id="chatBox" class="card">
                <!-- Data drops inline dynamically here -->
            </div>

            <!-- CHAT DISPATCH SUBMISSION INTERACTIVE FOOTER -->
            <div class="chat-footer">
                <form method="POST" id="msgDispatchForm">
                    <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
                    
                    <div class="d-flex gap-2">
                        <input type="text" name="message" autocomplete="off" class="form-control chat-field" placeholder="Type data stream message down..." required>
                        <button class="btn btn-primary btn-chat-send d-inline-flex align-items-center justify-content-center gap-1.5">
                            <span>Send</span> <i class="bi bi-send-fill small"></i>
                        </button>
                    </div>
                </form>
            </div>
        </div>

    </div>
</div>

<!-- DATA STREAM INTERACTION SCRIPT ENGINE -->
<script>
    const user1 = {{ user1_id }};
    const user2 = {{ user2_id }};
    let lastHTML = "";
    const chatContainer = document.getElementById("chatBox");

    function loadMessages() {
        fetch(`/get_messages/${user2}`)
        .then(response => response.json())
        .then(data => {
            let html = "";
            data.forEach(msg => {
                if(msg.sender_id == user1) {
                    html += `
                    <div class="text-end mb-3">
                        <div class="msg-bubble-outbound">
                            ${msg.message}
                        </div>
                        <div class="mt-1 font-monospace" style="font-size: 0.72rem; color: var(--cc-text-muted);">
                            ${msg.time}
                        </div>
                    </div>
                    `;
                } else {
                    html += `
                    <div class="text-start mb-3">
                        <div class="msg-bubble-inbound">
                            ${msg.message}
                        </div>
                        <div class="mt-1 font-monospace" style="font-size: 0.72rem; color: var(--cc-text-muted);">
                            ${msg.time}
                        </div>
                    </div>
                    `;
                }
            });

            if(html !== lastHTML) {
                chatContainer.innerHTML = html;
                lastHTML = html;
                chatContainer.scrollTop = chatContainer.scrollHeight;
            }
        }).catch(err => console.error("Asynchronous error parsing active chat link payloads:", err));
    }

    // Initialize execution and set poll timers cleanly
    loadMessages();
    setInterval(loadMessages, 5000);
</script>
{% endblock %}
