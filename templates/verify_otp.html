{% extends 'base.html' %}

{% block title %}
Verify OTP - College Connect
{% endblock %}

{% block content %}
<style>
    .auth-card {
        background-color: var(--cc-surface) !important;
        border: 1px solid var(--cc-border) !important;
        border-radius: 16px !important;
        box-shadow: 0 16px 36px rgba(0, 0, 0, 0.4) !important;
    }
    .otp-input {
        background-color: #0b0f19 !important;
        border: 1px solid var(--cc-border) !important;
        color: #ffffff !important;
        padding: 0.8rem 1rem !important;
        border-radius: 10px !important;
        letter-spacing: 0.1em;
        font-family: monospace;
    }
    .otp-input:focus {
        background-color: #0f172a !important;
        border-color: #10b981 !important;
        box-shadow: 0 0 0 3px rgba(16, 185, 129, 0.25) !important;
        color: #ffffff !important;
    }
    .btn-cc-success {
        background-color: #10b981 !important;
        border: none !important;
        padding: 0.8rem !important;
        font-weight: 600;
        border-radius: 10px !important;
        transition: all 0.2s ease;
    }
    .btn-cc-success:hover {
        background-color: #059669 !important;
        box-shadow: 0 4px 14px rgba(16, 185, 129, 0.3);
    }
</style>

<div class="row justify-content-center my-5">
    <div class="col-12 col-sm-10 col-md-7 col-lg-5 col-xl-4">
        <div class="card p-4 auth-card">
            <div class="text-center mb-4">
                <div class="d-inline-flex align-items-center justify-content-center bg-success bg-opacity-10 text-success rounded-circle mb-3" style="width: 56px; height: 56px;">
                    <i class="bi bi-patch-check-fill fs-3"></i>
                </div>
                <h2 class="fw-bold text-white h4 mb-2">Verify Security OTP</h2>
                <p class="m-0 small text-white-50 px-2" style="color: var(--cc-text-muted) !important;">
                    Input the temporary validation code sent to your communication path to unlock credentials.
                </p>
            </div>

            <form method="POST">
                <div class="mb-3">
                    <label class="form-label small fw-semibold text-white-50 mb-2">One-Time Token Passcode</label>
                    <input type="text" name="otp" placeholder="Enter validation token..." class="form-control text-center otp-input" required>
                </div>

                <button class="btn btn-success w-100 btn-cc-success d-flex align-items-center justify-content-center gap-2">
                    Validate Access Token <i class="bi bi-shield-check-fill"></i>
                </button>
            </form>
        </div>
    </div>
</div>
{% endblock %}
